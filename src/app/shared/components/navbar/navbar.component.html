<nav class="navbar navbar-expand glass-nav px-4 py-2">
  <div class="container-fluid justify-content-between">
    <span class="navbar-brand mb-0 h1 fs-5 fw-semibold d-flex align-items-center gap-2">
      <i class="bi bi-shield-check text-primary"></i>
      <span class="brand-text">Portal Workspace</span>
    </span>

    <div class="d-flex align-items-center gap-3">
      <!-- Dark/Light Mode Toggle Switch -->
      <button class="btn btn-sm btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center border-0" 
              (click)="toggleDarkMode()" 
              [title]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
              style="width: 38px; height: 38px; background-color: rgba(66, 82, 110, 0.08);">
        <i class="bi fs-5" [ngClass]="isDarkMode ? 'bi-sun-fill text-warning' : 'bi-moon-stars-fill text-primary'"></i>
      </button>

      <div class="d-none d-md-flex flex-column text-end">
        <span class="nav-username fw-medium text-capitalize" style="font-size: 0.85rem;">
          {{ authService.currentUserValue?.userName }}
        </span>
        <span class="text-muted" style="font-size: 0.75rem;">
          {{ authService.currentUserValue?.emailId }}
        </span>
      </div>

      <div class="dropdown">
        <button
          class="btn btn-outline-secondary dropdown-toggle d-flex align-items-center gap-2 py-1 px-2 rounded-pill"
          type="button"
          id="profileDropdown"
          data-bs-toggle="dropdown"
          aria-expanded="false">
          <div class="d-flex align-items-center justify-content-center rounded-circle text-white shadow-sm"
               [style.background-color]="userAvatar.color"
               style="width: 28px; height: 28px; font-size: 1rem; line-height: 1;">
            {{ userAvatar.emoji }}
          </div>
          <span class="d-none d-sm-inline fw-semibold text-dark me-1" style="font-size: 0.85rem;">Account</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-lg mt-2 nav-dropdown"
            aria-labelledby="profileDropdown">
          <li>
            <a class="dropdown-item py-2 d-flex align-items-center gap-2" routerLink="/profile-setup">
              <i class="bi bi-gear-fill text-primary"></i>
              <span>Profile Configuration</span>
            </a>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <button class="dropdown-item py-2 text-danger d-flex align-items-center gap-2" (click)="onLogout()">
              <i class="bi bi-box-arrow-right"></i>
              <span>Sign Out</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>
